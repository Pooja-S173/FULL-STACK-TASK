<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; text-align: center; }
        form { display: inline-block; background: #fff; padding: 25px; border-radius: 8px; margin-top: 40px; }
        input { margin: 10px 0; padding: 8px; width: 250px; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; }
        a { display: block; margin-top: 15px; text-decoration: none; color: #2196F3; }
    </style>
</head>
<body>
    <h2>Add New Product</h2>
    <form th:action="@{/savemodelleaf}" th:object="${model}" method="post">
        <input type="text" th:field="*{product_name}" placeholder="Product Name" required><br>
        <input type="text" th:field="*{product_price}" placeholder="Product Price" required><br>
        <input type="text" th:field="*{product_quantity}" placeholder="Product Quantity" required><br>
        <button type="submit">Save</button>
        <a th:href="@{/}">Back to List</a>
    </form>
</body>
</html>
