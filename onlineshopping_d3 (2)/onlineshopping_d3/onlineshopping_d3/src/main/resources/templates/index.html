
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; text-align: center; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 10px; }
        th { background: #4CAF50; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        a.button { padding: 6px 12px; text-decoration: none; color: white; border-radius: 4px; }
        .edit-btn { background: #2196F3; }
        .delete-btn { background: #f44336; }
        .add-btn { margin: 20px; display: inline-block; background: #4CAF50; padding: 8px 15px; color: white; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>
    <h2>Product List</h2>
    <a th:href="@{/shownewmodelleaf}" class="add-btn">+ Add New Product</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${listname}">
                <td th:text="${p.product_id}"></td>
                <td th:text="${p.product_name}"></td>
                <td th:text="${p.product_price}"></td>
                <td th:text="${p.product_quantity}"></td>
                <td>
                    <a th:href="@{'/showFormForUpdate/' + ${p.product_id}}" class="button edit-btn">Edit</a>
                    <a th:href="@{'/deletemodel/' + ${p.product_id}}" class="button delete-btn">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
