<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Information Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Dynamic Information Portal</h1>
    <button id="loadData">Load Posts</button>
    <input type="text" id="searchInput" placeholder="Search posts...">
    <button id="themeToggle">🌙 Dark Mode</button>
    <p id="resultCount"></p>
</header>

<div class="filter-buttons">
    <button onclick="filterCategory('All')">All</button>
    <button onclick="filterCategory('Technology')">Technology</button>
    <button onclick="filterCategory('Space')">Space</button>
    <button onclick="filterCategory('Energy')">Energy</button>
    <button onclick="filterCategory('Innovation')">Innovation</button>
</div>

<main>
    <div id="spinner" class="spinner hidden"></div>
    <section id="content" class="grid-container"></section>
</main>

<button id="topBtn">⬆</button>

<footer>
    <p>© 2026 Dynamic Portal | CO1 Project</p>
</footer>

<script src="script.js"></script>
</body>
</html>
